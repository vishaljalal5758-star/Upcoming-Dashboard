
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic CSV‑Dashboard</title>

    <!-- ==== CSS ==== -->
    <style>
        body { font-family: Arial, Helvetica, sans-serif; margin:0; padding:0; background:#f9f9f9; }
        header { background:#2c3e50; color:#fff; padding:1rem; text-align:center; }
        .container { width:95%; max-width:1200px; margin:2rem auto; }
        .cards { display:flex; flex-wrap:wrap; gap:1rem; margin-bottom:2rem; }
        .card { flex:1 1 300px; background:#fff; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,.1); padding:1rem; }
        canvas { max-width:100%; height:auto; }
        .loader { text-align:center; padding:2rem; font-size:1.2rem; color:#777; }
    </style>

    <!-- ==== Libraries ==== -->
    <!-- PapaParse – CSV parser -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js" integrity="sha512-eiVrTTMQn8ktUejTc4I+EEPmm3jTSS5ae2MfsM6GhKZ7woT9HdGKRj5n938w9Rl6hAJwVTX+dwUBU6gWXwKSpQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <!-- Chart.js – charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <!-- DataTables – searchable table -->
    <link rel="stylesheet"
          href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
            integrity="sha256-3fpJwK8T8lD6gVSOEDhGPcKy3f1J/7N/6DQTGDL6ykM="
            crossorigin="anonymous"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
</head>

<body>

<header>
    <h1>📊 Dynamic Dashboard – CSV from Google Sheets</h1>
</header>

<div class="container">

    <!-- Loader – shown while data is being fetched -->
    <div id="loader" class="loader">Loading data…</div>

    <!-- 📈 Chart cards -->
    <div class="cards" id="chart-area" style="display:none;">
        <div class="card">
            <h3>Chart #1 – Example (first numeric column vs. Row index)</h3>
            <canvas id="chart1"></canvas>
        </div>
        <div class="card">
            <h3>Chart #2 – Example (sum per category)</h3>
            <canvas id="chart2"></canvas>
        </div>
    </div>

    <!-- 📋 Table card -->
    <div class="card" id="table-card" style="display:none;">
        <h3>Full Table</h3>
        <table id="csv-table" class="display" style="width:100%"></table>
    </div>

</div>

<script>

    // -------------------------------------------------
    // 1️⃣ SETTINGS – adjust to your data needs
    // -------------------------------------------------
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSZjO-A6VhuzifXXgffaGdtD6ysazVtS1FTjeFTUxdi-q9IIfjc4DZmrS3QF7MhzKjHRqeN36ZeX_qu/pub?gid=1590006273&single=true&output=csv";

    // How often (ms) we pull fresh data from the sheet
    const REFRESH_INTERVAL = 5 * 60 * 1000;   // 5 minutes

    // -------------------------------------------------
    // 2️⃣ FETCH & PARSE CSV
    // -------------------------------------------------
    async function loadCSV() {
        try {
            const response = await fetch(CSV_URL);
            const csvText = await response.text();

            // PapaParse async parsing (handles commas, line‑breaks, etc.)
            return new Promise((resolve, reject) => {
                Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true,
                    dynamicTyping: true,   // convert numbers automatically
                    complete: results => resolve(results.data),
                    error: err => reject(err)
                });
            });
        } catch (e) {
            console.error("Error fetching CSV:", e);
            return null;
        }
    }

    // -------------------------------------------------
    // 3️⃣ RENDER TABLE (DataTables)
    // -------------------------------------------------
    function drawTable(data) {
        // Build column definition from header row
        const cols = Object.keys(data[0] || {});
        const columnDefs = cols.map(col => ({
            title: col,
            data: col
        }));

        // Destroy previous instance (if any) before re‑creating
        if ($.fn.DataTable.isDataTable('#csv-table')) {
            $('#csv-table').DataTable().clear().rows.add(data).draw();
        } else {
            $('#csv-table').DataTable({
                data: data,
                columns: columnDefs,
                pageLength: 15,
                responsive: true,
                order: []          // disable initial ordering – let user decide
            });
        }
    }

    // -------------------------------------------------
    // 4️⃣ CHART #1 – simple line chart (index vs. a numeric column)
    // -------------------------------------------------
    function drawChart1(data) {
        // Choose a numeric column – change 'YourNumericColumn' to the real name
        const numericCol = Object.keys(data[0]).find(k => typeof data[0][k] === "number");
        if (!numericCol) return;

        const labels = data.map((_, i) => i + 1);         // Row number on X‑axis
        const values = data.map(row => row[numericCol]); // Y‑axis values

        const ctx = document.getElementById('chart1').getContext('2d');
        if (window.chart1) window.chart1.destroy(); // reset on refresh

        window.chart1 = new Chart(ctx, {
            type: "line",
            data: {
                labels,
                datasets: [{
                    label: numericCol,
                    data: values,
                    borderColor: "#3498db",
                    backgroundColor: "rgba(52,152,219,0.2)",
                    fill: true,
                    tension: 0.2
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { position: "top" } },
                scales: {
                    x: { title: { display: true, text: "Row #"} },
                    y: { title: { display: true, text: numericCol } }
                }
            }
        });
    }

    // -------------------------------------------------
    // 5️⃣ CHART #2 – example grouped bar chart (sum per category)
    // -------------------------------------------------
    function drawChart2(data) {
        // Assume you have a categorical column called “Category”
        // and a numeric column called “Value”.  If your sheet has
        // different names, replace them below.
        const catCol = Object.keys(data[0]).find(k => typeof data[0][k] === "string");
        const numCol = Object.keys(data[0]).find(k => typeof data[0][k] === "number");

        if (!catCol || !numCol) return;

        // Group by category → sum of numeric values
        const grouping = {};
        data.forEach(row => {
            const cat = row[catCol] ?? "Unknown";
            const val = Number(row[numCol]) || 0;
            grouping[cat] = (grouping[cat] || 0) + val;
        });

        const labels = Object.keys(grouping);
        const values = labels.map(l => grouping[l]);

        const ctx = document.getElementById('chart2').getContext('2d');
        if (window.chart2) window.chart2.destroy();

        window.chart2 = new Chart(ctx, {
            type: "bar",
            data: {
                labels,
                datasets: [{
                    label: `Total ${numCol} per ${catCol}`,
                    data: values,
                    backgroundColor: "#e74c3c",
                    borderColor: "#c0392b",
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { position: "top" } },
                scales: {
                    x: { title: { display: true, text: catCol } },
                    y: { title: { display: true, text: `Sum of ${numCol}` },
                         beginAtZero: true }
                }
            }
        });
    }

    // -------------------------------------------------
    // 6️⃣ MAIN function – load → render → schedule refresh
    // -------------------------------------------------
    async function refreshDashboard() {
        document.getElementById('loader').style.display = "block";
        document.getElementById('chart-area').style.display = "none";
        document.getElementById('table-card').style.display = "none";

        const data = await loadCSV();
        if (!data || data.length === 0) {
            document.getElementById('loader').innerText = "❌ No data loaded.";
            return;
        }

        // Hide loader and show sections
        document.getElementById('loader').style.display = "none";
        document.getElementById('chart-area').style.display = "flex";
        document.getElementById('table-card').style.display = "block";

        // Render everything
        drawTable(data);
        drawChart1(data);
        drawChart2(data);
    }

    // First load
    refreshDashboard();

    // Auto‑refresh every REFRESH_INTERVAL ms
    setInterval(refreshDashboard, REFRESH_INTERVAL);

</script>

</body>
</html>

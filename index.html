<style>
/* Force the table to fit the screen without side-scrolling */
table, .responsive-table {
  width: 100% !important;
  table-layout: fixed !important; /* Locks column widths to viewport */
  border-collapse: collapse;
}

/* Force long texts, titles, and IDs to wrap downwards instead of stretching the row */
th, td {
  padding: 10px;
  text-align: left;
  word-wrap: break-word !important;
  overflow-wrap: break-word !important;
  white-space: normal !important; /* Overrides absolute linear text strings */
}

/* Make headers look interactive and show they can be clicked */
th {
  cursor: pointer;
  user-select: none;
  position: relative;
}
th:hover {
  background-color: rgba(255, 255, 255, 0.1) !important;
}
th::after {
  content: ' ↕';
  font-size: 0.8em;
  color: #777;
}

/* Style the rows so they look clickable */
tbody tr {
  cursor: pointer;
  transition: background 0.15s ease-in-out;
}
tbody tr:hover {
  background-color: rgba(255, 255, 255, 0.08) !important;
}

/* Detail Popup Modal Styling */
.tender-modal {
  display: none;
  position: fixed;
  z-index: 9999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(4px);
}
.tender-modal-content {
  background-color: #1a2230; /* Matches your dashboard dark profile theme */
  color: #ffffff;
  margin: 8% auto;
  padding: 25px;
  border: 1px solid #2d3748;
  border-radius: 8px;
  width: 85%;
  max-width: 650px;
  position: relative;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
.tender-modal-close {
  position: absolute;
  right: 20px;
  top: 15px;
  font-size: 28px;
  font-weight: bold;
  cursor: pointer;
  color: #a0aec0;
}
.tender-modal-close:hover {
  color: #fff;
}
.modal-grid-row {
  margin-bottom: 12px;
  border-bottom: 1px solid #2d3748;
  padding-bottom: 8px;
}
</style>

<div id="tenderDetailsModal" class="tender-modal">
  <div class="tender-modal-content">
    <span class="tender-modal-close" onclick="closeTenderModal()">&times;</span>
    <h2 style="margin-top:0; color:#4fd1c5; padding-right:20px;" id="m-title">Tender Details</h2>
    <hr style="border:0; border-top:1px solid #2d3748; margin-bottom:15px;">
    <div id="tenderModalBody">
      </div>
  </div>
</div>

<script>
// Global tracking for sorting state
let currentSortKey = '';
let isAscendingOrder = true;

// Bind this function to your existing setup right after your data array loads/fetches
function setupEnhancedTableFeatures() {
  attachHeaderSortEvents();
  filterAndValidateTenderDates();
  attachRowClickTriggers();
}

// Ensure columns are sortable by hooking click listeners to your <th> tags
function attachHeaderSortEvents() {
  const headers = document.querySelectorAll("table thead th");
  
  // Array mapping matching your columns: title, id, state, city, organisation, value, emd, deadline, published
  const columnKeys = ['title', 'id', 'state', 'city', 'organisation', 'value', 'emd', 'deadline', 'published'];
  
  headers.forEach((th, index) => {
    const key = columnKeys[index - 1]; // Offset index if you use a leading '#' index column
    if (!key) return;
    
    th.addEventListener('click', () => {
      let type = 'string';
      if (key === 'value' || key === 'emd') type = 'number';
      if (key === 'deadline' || key === 'published') type = 'date';
      
      executeInlineSort(key, type);
    });
  });
}

// Clean up NA items and enforce chronological rule: (Bid Deadline >= Published Date)
function filterAndValidateTenderDates() {
  // Replace 'tendersDataArray' with whatever global array name holds your rows (e.g., globalTenders)
  if (typeof tendersDataArray !== 'undefined') {
    tendersDataArray = tendersDataArray.filter(item => {
      if (!item.published || !item.deadline || item.published === 'N/A' || item.deadline === 'N/A') {
        return false; // Drops elements missing absolute date data strings
      }
      const pubDate = new Date(item.published);
      const deadDate = new Date(item.deadline);
      return (!isNaN(pubDate) && !isNaN(deadDate) && deadDate >= pubDate);
    });
  }
}

// Engine that sorts raw arrays inline
function executeInlineSort(key, type) {
  if (typeof tendersDataArray === 'undefined') return;
  
  if (currentSortKey === key) {
    isAscendingOrder = !isAscendingOrder;
  } else {
    currentSortKey = key;
    isAscendingOrder = true;
  }
  
  tendersDataArray.sort((a, b) => {
    let valA = a[key];
    let valB = b[key];
    
    if (type === 'number') {
      // Strips out non-numeric styling rules like '₹' or 'Cr' or commas
      let numA = parseFloat(String(valA).replace(/[^0-9.-]+/g,"")) || 0;
      let numB = parseFloat(String(valB).replace(/[^0-9.-]+/g,"")) || 0;
      return isAscendingOrder ? numA - numB : numB - numA;
    } else if (type === 'date') {
      return isAscendingOrder ? new Date(valA) - new Date(valB) : new Date(valB) - new Date(valA);
    } else {
      return isAscendingOrder ? String(valA).localeCompare(String(valB)) : String(valB).localeCompare(String(valA));
    }
  });
  
  // Call your existing table rebuilding function here to refresh visible items
  if (typeof renderTableData === 'function') {
    renderTableData(); 
  }
  attachRowClickTriggers(); // Re-apply triggers to fresh elements
}

// Dynamic injection configuration for row clicks
function attachRowClickTriggers() {
  const rows = document.querySelectorAll("table tbody tr");
  rows.forEach((row, index) => {
    row.addEventListener('click', () => {
      // Resolves structural object directly based on global scope index context
      const data = tendersDataArray[index]; 
      if (data) openTenderModal(data);
    });
  });
}

function openTenderModal(item) {
  document.getElementById('m-title').innerText = item.title || 'Tender Project Details';
  
  const bodyHTML = `
    <div class="modal-grid-row"><strong>Tender ID:</strong> ${item.id || 'N/A'}</div>
    <div class="modal-grid-row"><strong>State / City:</strong> ${item.state || 'N/A'} / ${item.city || 'N/A'}</div>
    <div class="modal-grid-row"><strong>Organisation Name:</strong> ${item.organisation || 'N/A'}</div>
    <div class="modal-grid-row"><strong>Project Total Value:</strong> ${item.value || 'N/A'}</div>
    <div class="modal-grid-row"><strong>EMD Details:</strong> ₹${item.emd || 'N/A'}</div>
    <div class="modal-grid-row" style="color: #fc8181;"><strong>Published Date:</strong> ${item.published || 'N/A'}</div>
    <div class="modal-grid-row" style="color: #68d391;"><strong>Bid Submission Deadline:</strong> ${item.deadline || 'N/A'}</div>
  `;
  
  document.getElementById('tenderModalBody').innerHTML = bodyHTML;
  document.getElementById('tenderDetailsModal').style.display = 'block';
}

function closeTenderModal() {
  document.getElementById('tenderDetailsModal').style.display = 'none';
}

// Close popup window natively if user clicks out into the blurred safe zone grid space
window.onclick = function(event) {
  const modal = document.getElementById('tenderDetailsModal');
  if (event.target == modal) {
    modal.style.display = "none";
  }
}

// Initialize setups when your dashboard completes load sequence
document.addEventListener("DOMContentLoaded", () => {
  // Optional delay to wait for your remote fetch script to pull local files
  setTimeout(setupEnhancedTableFeatures, 1000);
});
</script>

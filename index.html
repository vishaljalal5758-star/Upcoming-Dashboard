<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dynamic Tender Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body {
      font-family: Inter, system-ui, sans-serif;
      margin: 0;
      padding: 0;
      background: #f4f7fb;
      color: #1f2937;
    }
    .app-shell {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
    }
    .header {
      display: grid;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .header h1 {
      margin: 0;
      font-size: 2rem;
      letter-spacing: -0.02em;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 1.25rem;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.06);
    }
    .card strong {
      display: block;
      font-size: 1.25rem;
      margin-bottom: 0.5rem;
    }
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .filters label {
      display: flex;
      flex-direction: column;
      font-size: 0.95rem;
      gap: 0.5rem;
    }
    .filters select,
    .filters input {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 0.8rem 1rem;
      font-size: 0.95rem;
      background: white;
      min-width: 220px;
    }
    .grid-charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .table-wrapper {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.06);
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead {
      background: #111827;
      color: white;
    }
    th, td {
      text-align: left;
      padding: 0.85rem 1rem;
      border-bottom: 1px solid #e5e7eb;
      font-size: 0.95rem;
    }
    tbody tr:hover {
      background: #f8fafc;
    }
    .small {
      font-size: 0.85rem;
      color: #6b7280;
    }
    @media (max-width: 900px) {
      .grid-charts {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="header">
      <div>
        <h1>Dynamic Tender Dashboard</h1>
        <p class="small">Live data loaded from the published Google Sheets CSV.</p>
      </div>
    </div>

    <div class="summary-grid">
      <div class="card">
        <strong id="total-tenders">0</strong>
        Total Tenders
      </div>
      <div class="card">
        <strong id="total-value">₹0</strong>
        Total Tender Value
      </div>
      <div class="card">
        <strong id="upcoming-count">0</strong>
        Upcoming Tenders
      </div>
      <div class="card">
        <strong id="published-states">0</strong>
        Unique States
      </div>
    </div>

    <div class="filters">
      <label>
        Status Filter
        <select id="status-filter">
          <option value="all">All</option>
        </select>
      </label>
      <label>
        State Filter
        <select id="state-filter">
          <option value="all">All</option>
        </select>
      </label>
      <label>
        Search Title
        <input id="text-filter" type="search" placeholder="Search tender title or description" />
      </label>
    </div>

    <div class="grid-charts">
      <div class="card">
        <h3>By Tender Status</h3>
        <canvas id="statusChart" height="280"></canvas>
      </div>
      <div class="card">
        <h3>Top States by Tender Count</h3>
        <canvas id="stateChart" height="280"></canvas>
      </div>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Tender ID</th>
            <th>Status</th>
            <th>State</th>
            <th>Organisation</th>
            <th>Tender Value</th>
            <th>Published</th>
            <th>End Date</th>
          </tr>
        </thead>
        <tbody id="data-body">
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSZjO-A6VhuzifXXgffaGdtD6ysazVtS1FTjeFTUxdi-q9IIfjc4DZmrS3QF7MhzKjHRqeN36ZeX_qu/pub?gid=1590006273&single=true&output=csv';

    const parseCsv = (text) => {
      const rows = [];
      const lines = text.split(/\r?\n/).filter(Boolean);
      const headers = lines.shift().split(/,(?=(?:[^"]*"[^"]*")*(?![^"]*"))/);
      for (const line of lines) {
        const values = line.match(/(,|^)(?:"([^"]*(?:""[^"]*)*)"|([^",]*))/g).map(cell => {
          const value = cell.replace(/^,?/, '');
          if (value.startsWith('"') && value.endsWith('"')) {
            return value.slice(1, -1).replace(/""/g, '"');
          }
          return value;
        });
        if (values.length === headers.length) {
          const row = Object.fromEntries(headers.map((h, i) => [h.trim(), values[i]?.trim()]));
          rows.push(row);
        }
      }
      return rows;
    };

    const formatCurrency = (num) => {
      if (Number.isNaN(num)) return '₹0';
      return new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(num);
    };

    const getNumber = (value) => {
      if (!value) return 0;
      const cleaned = value.replace(/[^0-9.\-]/g, '');
      return parseFloat(cleaned) || 0;
    };

    const buildOptions = (id, values) => {
      const select = document.querySelector(id);
      const sorted = [...new Set(values.filter(Boolean))].sort((a, b) => a.localeCompare(b));
      for (const value of sorted) {
        const option = document.createElement('option');
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      }
    };

    const renderMetrics = (rows) => {
      const totalTenders = rows.length;
      const totalValue = rows.reduce((sum, row) => sum + getNumber(row['Tender Value']), 0);
      const upcomingCount = rows.filter(row => row['Tender Status']?.toLowerCase() === 'upcoming').length;
      const uniqueStates = new Set(rows.map(row => row['State']).filter(Boolean)).size;
      document.getElementById('total-tenders').innerText = totalTenders;
      document.getElementById('total-value').innerText = formatCurrency(totalValue);
      document.getElementById('upcoming-count').innerText = upcomingCount;
      document.getElementById('published-states').innerText = uniqueStates;
    };

    const createChart = (ctx, type, labels, data, options = {}) => {
      return new Chart(ctx, {
        type,
        data: {
          labels,
          datasets: [{
            label: 'Count',
            data,
            backgroundColor: labels.map((_, index) => `hsl(${index * 40 % 360}, 72%, 58%)`),
            borderWidth: 0,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: 'bottom' },
            tooltip: { mode: 'index', intersect: false }
          },
          ...options,
        }
      });
    };

    let statusChart;
    let stateChart;

    const renderCharts = (rows) => {
      const statusCounts = {};
      const stateCounts = {};
      rows.forEach(row => {
        const status = row['Tender Status'] || 'Unknown';
        const state = row['State'] || 'Unknown';
        statusCounts[status] = (statusCounts[status] || 0) + 1;
        stateCounts[state] = (stateCounts[state] || 0) + 1;
      });
      const statusLabels = Object.keys(statusCounts);
      const statusData = statusLabels.map(key => statusCounts[key]);
      const stateLabels = Object.entries(stateCounts)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 10)
        .map(([state]) => state);
      const stateData = stateLabels.map(label => stateCounts[label]);

      const ctxStatus = document.getElementById('statusChart').getContext('2d');
      const ctxState = document.getElementById('stateChart').getContext('2d');
      if (statusChart) statusChart.destroy();
      if (stateChart) stateChart.destroy();
      statusChart = createChart(ctxStatus, 'doughnut', statusLabels, statusData, { plugins: { legend: { position: 'right' } } });
      stateChart = createChart(ctxState, 'bar', stateLabels, stateData, {
        scales: { y: { beginAtZero: true, ticks: { precision: 0 } } }
      });
    };

    const renderTable = (rows) => {
      const tbody = document.getElementById('data-body');
      tbody.innerHTML = '';
      rows.forEach((row, index) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${index + 1}</td>
          <td>${row['Tender ID'] || ''}</td>
          <td>${row['Tender Status'] || ''}</td>
          <td>${row['State'] || ''}</td>
          <td>${row['Organisation'] || ''}</td>
          <td>${formatCurrency(getNumber(row['Tender Value']))}</td>
          <td>${row['Published Date'] || ''}</td>
          <td>${row['Bid Submission End Date'] || ''}</td>
        `;
        tbody.appendChild(tr);
      });
    };

    const applyFilters = (rows) => {
      const status = document.getElementById('status-filter').value;
      const state = document.getElementById('state-filter').value;
      const text = document.getElementById('text-filter').value.trim().toLowerCase();
      return rows.filter(row => {
        const matchStatus = status === 'all' || row['Tender Status'] === status;
        const matchState = state === 'all' || row['State'] === state;
        const matchText = text === '' || [row['Title'], row['Description'], row['Organisation'], row['Tender ID']]
          .filter(Boolean)
          .some(value => value.toLowerCase().includes(text));
        return matchStatus && matchState && matchText;
      });
    };

    const initFilters = (rows) => {
      buildOptions('#status-filter', rows.map(row => row['Tender Status']));
      buildOptions('#state-filter', rows.map(row => row['State']));
      const updateUI = () => {
        const filtered = applyFilters(rows);
        renderMetrics(filtered);
        renderCharts(filtered);
        renderTable(filtered);
      };
      document.getElementById('status-filter').addEventListener('change', updateUI);
      document.getElementById('state-filter').addEventListener('change', updateUI);
      document.getElementById('text-filter').addEventListener('input', updateUI);
      updateUI();
    };

    fetch(csvUrl)
      .then(response => response.text())
      .then(text => {
        const data = parseCsv(text);
        initFilters(data);
      })
      .catch(error => {
        document.body.innerHTML = `<div style="padding:2rem; color:#b91c1c;"><h2>Unable to load dashboard data</h2><p>${error.message}</p></div>`;
      });
  </script>
</body>
</html>


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Sales Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #f5f7fa;
            color: #333;
            padding: 20px;
        }
        
        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e1e5eb;
        }
        
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }
        
        .subtitle {
            color: #7f8c8d;
            font-size: 1.1rem;
        }
        
        .stats-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
        }
        
        .stat-icon {
            background-color: #f0f7ff;
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 20px;
        }
        
        .stat-icon i {
            font-size: 28px;
            color: #3498db;
        }
        
        .stat-content {
            flex: 1;
        }
        
        .stat-title {
            font-size: 0.95rem;
            color: #7f8c8d;
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #2c3e50;
        }
        
        .stat-change {
            font-size: 0.9rem;
            margin-top: 5px;
        }
        
        .positive {
            color: #2ecc71;
        }
        
        .negative {
            color: #e74c3c;
        }
        
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .data-controls {
            display: flex;
            gap: 10px;
        }
        
        button, select {
            padding: 10px 15px;
            border-radius: 6px;
            border: 1px solid #ddd;
            background: white;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        button:hover, select:hover {
            background-color: #f8f9fa;
        }
        
        button:active, select:active {
            transform: translateY(1px);
        }
        
        #refreshBtn {
            background-color: #3498db;
            color: white;
            border: none;
        }
        
        #refreshBtn:hover {
            background-color: #2980b9;
        }
        
        .charts-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .chart-card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }
        
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .chart-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #2c3e50;
        }
        
        .chart-container {
            position: relative;
            height: 300px;
        }
        
        .data-table {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            overflow-x: auto;
            margin-bottom: 30px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background-color: #f8f9fa;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #2c3e50;
            border-bottom: 1px solid #e1e5eb;
        }
        
        td {
            padding: 15px;
            border-bottom: 1px solid #f1f1f1;
        }
        
        tr:hover {
            background-color: #f9f9f9;
        }
        
        footer {
            text-align: center;
            padding: 20px;
            color: #7f8c8d;
            font-size: 0.9rem;
            border-top: 1px solid #e1e5eb;
            margin-top: 20px;
        }
        
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .data-source {
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-top: 5px;
        }
        
        @media (max-width: 1100px) {
            .charts-container {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .stat-value {
                font-size: 1.7rem;
            }
            
            .chart-card {
                padding: 15px;
            }
            
            .chart-container {
                height: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <header>
            <h1><i class="fas fa-chart-line"></i> Dynamic Sales Dashboard</h1>
            <p class="subtitle">Interactive dashboard powered by live Google Sheets data</p>
            <p class="data-source">Data Source: Google Sheets CSV Link</p>
        </header>
        
        <div class="stats-summary" id="statsSummary">
            <!-- Will be populated by JavaScript -->
        </div>
        
        <div class="controls">
            <div class="data-controls">
                <button id="refreshBtn">
                    <i class="fas fa-sync-alt"></i> Refresh Data
                </button>
                <select id="regionFilter">
                    <option value="all">All Regions</option>
                    <!-- Will be populated by JavaScript -->
                </select>
                <select id="yearFilter">
                    <option value="all">All Years</option>
                    <!-- Will be populated by JavaScript -->
                </select>
            </div>
            <div id="lastUpdated">Last updated: Loading...</div>
        </div>
        
        <div class="charts-container">
            <div class="chart-card">
                <div class="chart-header">
                    <h3 class="chart-title">Sales by Region</h3>
                </div>
                <div class="chart-container">
                    <canvas id="regionChart"></canvas>
                </div>
            </div>
            
            <div class="chart-card">
                <div class="chart-header">
                    <h3 class="chart-title">Monthly Sales Trend</h3>
                </div>
                <div class="chart-container">
                    <canvas id="monthlyChart"></canvas>
                </div>
            </div>
        </div>
        
        <div class="data-table">
            <h3>Sales Data Table</h3>
            <div id="tableContainer">
                <!-- Will be populated by JavaScript -->
            </div>
        </div>
        
        <footer>
            <p>Dynamic Dashboard &copy; 2023 | Data updates automatically from Google Sheets</p>
        </footer>
    </div>

    <script>
        // Dashboard configuration
        const dashboardConfig = {
            csvUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSZjO-A6VhuzifXXgffaGdtD6ysazVtS1FTjeFTUxdi-q9IIfjc4DZmrS3QF7MhzKjHRqeN36ZeX_qu/pub?gid=1590006273&single=true&output=csv',
            refreshInterval: 300000, // 5 minutes in milliseconds
            chartColors: [
                '#3498db', '#2ecc71', '#e74c3c', '#f39c12', '#9b59b6',
                '#1abc9c', '#d35400', '#c0392b', '#16a085', '#8e44ad'
            ]
        };

        // Global variables
        let rawData = [];
        let filteredData = [];
        let regionChartInstance = null;
        let monthlyChartInstance = null;
        
        // DOM elements
        const statsSummary = document.getElementById('statsSummary');
        const refreshBtn = document.getElementById('refreshBtn');
        const regionFilter = document.getElementById('regionFilter');
        const yearFilter = document.getElementById('yearFilter');
        const lastUpdated = document.getElementById('lastUpdated');
        const tableContainer = document.getElementById('tableContainer');
        
        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', function() {
            // Load data initially
            loadData();
            
            // Set up refresh button
            refreshBtn.addEventListener('click', loadData);
            
            // Set up filter change listeners
            regionFilter.addEventListener('change', applyFilters);
            yearFilter.addEventListener('change', applyFilters);
            
            // Set up auto-refresh
            setInterval(loadData, dashboardConfig.refreshInterval);
        });
        
        // Load CSV data from Google Sheets
        async function loadData() {
            try {
                showLoadingState();
                
                // Fetch CSV data
                const response = await fetch(dashboardConfig.csvUrl);
                const csvText = await response.text();
                
                // Parse CSV to JSON
                rawData = parseCSV(csvText);
                
                // Update UI with loaded data
                updateFilters();
                applyFilters();
                updateLastUpdated();
                
            } catch (error) {
                console.error('Error loading data:', error);
                showErrorState('Failed to load data. Please check your connection and try again.');
            }
        }
        
        // Parse CSV text to JSON array
        function parseCSV(csvText) {
            const lines = csvText.trim().split('\n');
            const headers = lines[0].split(',').map(header => header.trim());
            
            const data = [];
            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split(',');
                const entry = {};
                
                for (let j = 0; j < headers.length; j++) {
                    // Clean up the value
                    let value = values[j] ? values[j].trim().replace(/"/g, '') : '';
                    
                    // Try to convert numeric values
                    if (!isNaN(value) && value !== '') {
                        value = Number(value);
                    }
                    
                    entry[headers[j]] = value;
                }
                
                data.push(entry);
            }
            
            return data;
        }
        
        // Update filter dropdowns based on loaded data
        function updateFilters() {
            if (rawData.length === 0) return;
            
            // Get unique regions
            const regions = [...new Set(rawData.map(item => item.Region || item.region))];
            regionFilter.innerHTML = '<option value="all">All Regions</option>';
            regions.forEach(region => {
                if (region) {
                    regionFilter.innerHTML += `<option value="${region}">${region}</option>`;
                }
            });
            
            // Get unique years (assuming there's a Year or Date column)
            const years = [];
            rawData.forEach(item => {
                let year = null;
                
                // Check different possible column names for year
                if (item.Year) year = item.Year;
                else if (item.year) year = item.year;
                else if (item.Date) {
                    const date = new Date(item.Date);
                    if (!isNaN(date)) year = date.getFullYear();
                }
                
                if (year && !years.includes(year)) years.push(year);
            });
            
            // Sort years and populate filter
            years.sort();
            yearFilter.innerHTML = '<option value="all">All Years</option>';
            years.forEach(year => {
                yearFilter.innerHTML += `<option value="${year}">${year}</option>`;
            });
        }
        
        // Apply filters and update dashboard
        function applyFilters() {
            if (rawData.length === 0) return;
            
            let filtered = [...rawData];
            
            // Apply region filter
            const selectedRegion = regionFilter.value;
            if (selectedRegion !== 'all') {
                filtered = filtered.filter(item => 
                    (item.Region || item.region) === selectedRegion
                );
            }
            
            // Apply year filter
            const selectedYear = yearFilter.value;
            if (selectedYear !== 'all') {
                filtered = filtered.filter(item => {
                    let year = null;
                    
                    if (item.Year) year = item.Year.toString();
                    else if (item.year) year = item.year.toString();
                    else if (item.Date) {
                        const date = new Date(item.Date);
                        if (!isNaN(date)) year = date.getFullYear().toString();
                    }
                    
                    return year === selectedYear;
                });
            }
            
            filteredData = filtered;
            updateDashboard();
        }
        
        // Update all dashboard components
        function updateDashboard() {
            updateStatsSummary();
            updateCharts();
            updateDataTable();
        }
        
        // Update statistics summary cards
        function updateStatsSummary() {
            if (filteredData.length === 0) {
                statsSummary.innerHTML = '<div class="loading"><p>No data available for selected filters</p></div>';
                return;
            }
            
            // Calculate statistics based on data structure
            // These calculations depend on the actual CSV structure
            let totalSales = 0;
            let avgSales = 0;
            let regionCount = 0;
            let productCount = 0;
            
            // Try to identify numeric columns for calculations
            const numericColumns = [];
            if (filteredData.length > 0) {
                const firstRow = filteredData[0];
                for (const key in firstRow) {
                    if (typeof firstRow[key] === 'number') {
                        numericColumns.push(key);
                    }
                }
            }
            
            // Calculate based on available numeric columns
            if (numericColumns.length > 0) {
                // Use the first numeric column for calculations
                const numericColumn = numericColumns[0];
                const values = filteredData.map(item => item[numericColumn] || 0);
                
                totalSales = values.reduce((sum, val) => sum + val, 0);
                avgSales = totalSales / values.length;
                
                // Find unique regions (check common column names)
                const regionSet = new Set();
                filteredData.forEach(item => {
                    if (item.Region) regionSet.add(item.Region);
                    if (item.region) regionSet.add(item.region);
                });
                regionCount = regionSet.size;
                
                // Find unique products (check common column names)
                const productSet = new Set();
                filteredData.forEach(item => {
                    if (item.Product) productSet.add(item.Product);
                    if (item.product) productSet.add(item.product);
                    if (item['Product Name']) productSet.add(item['Product Name']);
                });
                productCount = productSet.size;
            }
            
            // Update stats summary HTML
            statsSummary.innerHTML = `
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-shopping-cart"></i>
                    </div>
                    <div class="stat-content">
                        <div class="stat-title">Total Sales</div>
                        <div class="stat-value">$${totalSales.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                        <div class="stat-change positive">Based on ${filteredData.length} records</div>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-chart-bar"></i>
                    </div>
                    <div class="stat-content">
                        <div class="stat-title">Average Sale</div>
                        <div class="stat-value">$${avgSales.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                        <div class="stat-change positive">Per record</div>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-globe"></i>
                    </div>
                    <div class="stat-content">
                        <div class="stat-title">Regions</div>
                        <div class="stat-value">${regionCount}</div>
                        <div class="stat-change positive">Covered in data</div>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-box"></i>
                    </div>
                    <div class="stat-content">
                        <div class="stat-title">Products</div>
                        <div class="stat-value">${productCount}</div>
                        <div class="stat-change positive">In dataset</div>
                    </div>
                </div>
            `;
        }
        
        // Update charts
        function updateCharts() {
            if (filteredData.length === 0) return;
            
            updateRegionChart();
            updateMonthlyChart();
        }
        
        // Update region chart
        function updateRegionChart() {
            const ctx = document.getElementById('regionChart').getContext('2d');
            
            // Group data by region
            const regionData = {};
            filteredData.forEach(item => {
                const region = item.Region || item.region || 'Unknown';
                const value = getNumericValue(item);
                
                if (!regionData[region]) {
                    regionData[region] = 0;
                }
                
                regionData[region] += value;
            });
            
            const labels = Object.keys(regionData);
            const data = Object.values(regionData);
            
            // Destroy existing chart instance if it exists
            if (regionChartInstance) {
                regionChartInstance.destroy();
            }
            
            // Create new chart
            regionChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Sales by Region',
                        data: data,
                        backgroundColor: dashboardConfig.chartColors.slice(0, labels.length),
                        borderColor: dashboardConfig.chartColors.slice(0, labels.length).map(color => color.replace('0.8', '1')),
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `Sales: $${context.parsed.y.toLocaleString()}`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) {
                                    return '$' + value.toLocaleString();
                                }
                            }
                        }
                    }
                }
            });
        }
        
        // Update monthly chart
        function updateMonthlyChart() {
            const ctx = document.getElementById('monthlyChart').getContext('2d');
            
            // Group data by month (if Date column exists)
            const monthlyData = {};
            
            filteredData.forEach(item => {
                let monthKey = 'Unknown';
                
                // Try to extract month from date
                if (item.Date) {
                    const date = new Date(item.Date);
                    if (!isNaN(date)) {
                        monthKey = date.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
                    }
                } else if (item.Month) {
                    monthKey = item.Month;
                } else if (item.month) {
                    monthKey = item.month;
                }
                
                const value = getNumericValue(item);
                
                if (!monthlyData[monthKey]) {
                    monthlyData[monthKey] = 0;
                }
                
                monthlyData[monthKey] += value;
            });
            
            // Sort months chronologically
            const sortedMonths = Object.keys(monthlyData).sort((a, b) => {
                // Simple sorting - could be enhanced for proper date sorting
                return a.localeCompare(b);
            });
            
            const labels = sortedMonths;
            const data = sortedMonths.map(month => monthlyData[month]);
            
            // Destroy existing chart instance if it exists
            if (monthlyChartInstance) {
                monthlyChartInstance.destroy();
            }
            
            // Create new chart
            monthlyChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Monthly Sales Trend',
                        data: data,
                        backgroundColor: 'rgba(52, 152, 219, 0.1)',
                        borderColor: dashboardConfig.chartColors[0],
                        borderWidth: 3,
                        fill: true,
                        tension: 0.2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `Sales: $${context.parsed.y.toLocaleString()}`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) {
                                    return '$' + value.toLocaleString();
                                }
                            }
                        }
                    }
                }
            });
        }
        
        // Helper function to get numeric value from a data row
        function getNumericValue(item) {
            // Look for numeric columns
            for (const key in item) {
                if (typeof item[key] === 'number') {
                    return item[key];
                }
            }
            
            // If no numeric columns found, try to parse first column that looks like a number
            for (const key in item) {
                if (!isNaN(parseFloat(item[key])) && isFinite(item[key])) {
                    return parseFloat(item[key]);
                }
            }
            
            return 0; // Default to 0 if no numeric value found
        }
        
        // Update data table
        function updateDataTable() {
            if (filteredData.length === 0) {
                tableContainer.innerHTML = '<p>No data available for selected filters</p>';
                return;
            }
            
            // Limit to first 20 rows for performance
            const displayData = filteredData.slice(0, 20);
            
            // Get column headers from first data row
            const headers = Object.keys(displayData[0]);
            
            // Generate table HTML
            let tableHTML = `
                <div style="margin-bottom: 15px; font-size: 0.9rem; color: #7f8c8d;">
                    Showing ${displayData.length} of ${filteredData.length} records
                </div>
                <table>
                    <thead>
                        <tr>
                            ${headers.map(header => `<th>${header}</th>`).join('')}
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            // Add data rows
            displayData.forEach(row => {
                tableHTML += `<tr>`;
                headers.forEach(header => {
                    let value = row[header];
                    
                    // Format numeric values
                    if (typeof value === 'number') {
                        value = value.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
                    }
                    
                    tableHTML += `<td>${value}</td>`;
                });
                tableHTML += `</tr>`;
            });
            
            tableHTML += `</tbody></table>`;
            
            tableContainer.innerHTML = tableHTML;
        }
        
        // Update last updated timestamp
        function updateLastUpdated() {
            const now = new Date();
            lastUpdated.textContent = `Last updated: ${now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
        }
        
        // Show loading state
        function showLoadingState() {
            statsSummary.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading data from Google Sheets...</p>
                </div>
            `;
            
            tableContainer.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading data...</p>
                </div>
            `;
        }
        
        // Show error state
        function showErrorState(message) {
            statsSummary.innerHTML = `
                <div class="loading">
                    <i class="fas fa-exclamation-triangle" style="font-size: 48px; color: #e74c3c; margin-bottom: 15px;"></i>
                    <p>${message}</p>
                    <button onclick="loadData()" style="margin-top: 15px; padding: 10px 20px; background-color: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer;">
                        <i class="fas fa-redo"></i> Try Again
                    </button>
                </div>
            `;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Analytics Dashboard</title>
    <!-- Tailwind CSS for sleek interface design -->
    <script src="https://tailwindcss.com"></script>
    <!-- Chart.js for data visualization generation -->
    <script src="https://jsdelivr.net"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans leading-normal tracking-normal">

    <!-- Top Navigation Header -->
    <nav class="bg-slate-900 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide">📊 Live Data Interface Engine</h1>
            <button onclick="fetchAndRenderData()" class="bg-blue-600 hover:bg-blue-700 text-white text-sm px-4 py-2 rounded transition font-medium shadow">
                🔄 Sync Live Data
            </button>
        </div>
    </nav>

    <!-- Main Dashboard Body -->
    <main class="container mx-auto px-4 py-8">
        
        <!-- Scorecard Summary KPIs -->
        <section class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">Total Evaluated Elements</span>
                <div id="kpi-total-rows" class="text-3xl font-extrabold text-slate-950 mt-1">--</div>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">Primary Tracking Dimension</span>
                <div id="kpi-x-axis" class="text-xl font-bold text-blue-600 truncate mt-2">--</div>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">Numerical Target Variable</span>
                <div id="kpi-y-axis" class="text-xl font-bold text-green-600 truncate mt-2">--</div>
            </div>
        </section>

        <!-- Main Chart Graphical Element -->
        <section class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-bold text-slate-800">Dynamic Distribution Frequency Chart</h2>
                <div class="flex space-x-2">
                    <button onclick="switchChartType('bar')" class="px-3 py-1 text-xs font-medium bg-slate-100 hover:bg-slate-200 rounded">Bar</button>
                    <button onclick="switchChartType('line')" class="px-3 py-1 text-xs font-medium bg-slate-100 hover:bg-slate-200 rounded">Line</button>
                </div>
            </div>
            <div class="relative w-full h-[400px]">
                <canvas id="analyticsCanvas"></canvas>
            </div>
        </section>

        <!-- Dynamic Data Source Table Grid -->
        <section class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 overflow-hidden">
            <h2 class="text-lg font-bold text-slate-800 mb-4">Granular Data Table Ledger</h2>
            <div class="overflow-x-auto max-h-96">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr id="table-headers" class="bg-slate-50 text-slate-400 uppercase text-xs font-bold tracking-wider border-b border-gray-100">
                            <!-- Dynamic Row Injection -->
                        </tr>
                    </thead>
                    <tbody id="table-body" class="text-sm divide-y divide-gray-100">
                        <tr>
                            <td class="p-4 text-center text-gray-400" colspan="100%">Awaiting live data streams...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        // Your designated target Google Sheets CSV Source Endpoint
        const csvSourceUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSZjO-A6VhuzifXXgffaGdtD6ysazVtS1FTjeFTUxdi-q9IIfjc4DZmrS3QF7MhzKjHRqeN36ZeX_qu/pub?gid=1590006273&single=true&output=csv";
        
        let globallyStoredParsedData = [];
        let runningChartReferenceInstance = null;
        let activeRenderingLayoutType = 'bar';

        // Custom parser to map CSV structure into clean JS objects
        function parseCSVStringData(rawTextString) {
            const rowArrays = rawTextString.split(/\r?\n/).map(row => row.trim()).filter(row => row.length > 0);
            if(rowArrays.length === 0) return { headers: [], data: [] };

            // Simple comma separation parser matching your CSV layout schema
            const headers = rowArrays[0].split(',').map(header => header.replace(/^"|"$/g, '').trim());
            
            const standardDataRows = rowArrays.slice(1).map(rowString => {
                const columnValues = rowString.split(',').map(val => val.replace(/^"|"$/g, '').trim());
                let rowEntityItem = {};
                headers.forEach((headerKey, cellIndex) => {
                    rowEntityItem[headerKey] = columnValues[cellIndex] || "";
                });
                return rowEntityItem;
            });

            return { headers, data: standardDataRows };
        }

        async function fetchAndRenderData() {
            try {
                const structuralResponse = await fetch(csvSourceUrl);
                const rawCsvTextText = await structuralResponse.text();
                const { headers, data } = parseCSVStringData(rawCsvTextText);
                
                if(!data || data.length === 0) throw new Error("Dataset is empty.");
                globallyStoredParsedData = data;

                // Dynamically extract primary structure from tracking document keys
                const columnKeys = Object.keys(data[0]);
                const xAxisDimensionKey = columnKeys[0]; 
                const yAxisMetricsValueKey = columnKeys[1] || columnKeys[0];

                // Render Summary Metric KPI Blocks
                document.getElementById('kpi-total-rows').innerText = data.length;
                document.getElementById('kpi-x-axis').innerText = xAxisDimensionKey;
                document.getElementById('kpi-y-axis').innerText = `${yAxisMetricsValueKey} Metrics`;

                // Run Interface Construction Cycles
                generateChartVisuals(data, xAxisDimensionKey, yAxisMetricsValueKey);
                generateDynamicTableLedger(headers, data);

            } catch (runtimeFaultException) {
                console.error("Dashboard core failure:", runtimeFaultException);
                alert("Data fetch execution collapsed. Verify spreadsheet link properties.");
            }
        }

        function generateChartVisuals(dataset, xAxisKey, yAxisKey) {
            const uniqueLabels = dataset.map(item => item[xAxisKey]);
            const targetValues = dataset.map(item => parseFloat(item[yAxisKey]) || 0);

            const canvasContext = document.getElementById('analyticsCanvas').getContext('2d');

            if (runningChartReferenceInstance) {
                runningChartReferenceInstance.destroy();
            }

            runningChartReferenceInstance = new Chart(canvasContext, {
                type: activeRenderingLayoutType,
                data: {
                    labels: uniqueLabels,
                    datasets: [{
                        label: yAxisKey,
                        data: targetValues,
                        backgroundColor: 'rgba(59, 130, 246, 0.5)',
                        borderColor: 'rgba(37, 99, 235, 1)',
                        borderWidth: 2,
                        tension: 0.3,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: true, position: 'top' } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#f3f4f6' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        function generateDynamicTableLedger(headers, dataset) {
            const headContainer = document.getElementById('table-headers');
            const bodyContainer = document.getElementById('table-body');

            // Inject structural table database headers
            headContainer.innerHTML = headers.map(header => `<th class="p-4">${header}</th>`).join('');

            // Inject structured contextual text data values
            bodyContainer.innerHTML = dataset.map(rowItem => {
                return `<tr class="hover:bg-slate-50 transition">
                    ${headers.map(headerKey => `<td class="p-4 text-gray-600 font-medium">${rowItem[headerKey]}</td>`).join('')}
                </tr>`;
            }).join('');
        }

        function switchChartType(selectedType) {
            if(activeRenderingLayoutType === selectedType || globallyStoredParsedData.length === 0) return;
            activeRenderingLayoutType = selectedType;
            const operationalKeys = Object.keys(globallyStoredParsedData[0]);
            generateChartVisuals(globallyStoredParsedData, operationalKeys[0], operationalKeys[1] || operationalKeys[0]);
        }

        // Automatic dashboard processing lifecycle initialization
        window.addEventListener('DOMContentLoaded', fetchAndRenderData);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic CSV Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .stat-card { text-align: center; }
        .stat-value { font-size: 2rem; font-weight: bold; color: var(--primary); }
        .chart-container { position: relative; height: 300px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
        th { background: #f1f5f9; position: sticky; top: 0; }
        .scrollable { max-height: 400px; overflow-y: auto; border-radius: 8px; }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 20px;">Business Analytics Dashboard</h2>

    <!-- Summary Cards -->
    <div class="grid">
        <div class="card stat-card">
            <div class="stat-label">Total Records</div>
            <div id="total-records" class="stat-value">0</div>
        </div>
        <div class="card stat-card">
            <div class="stat-label">Total Revenue</div>
            <div id="total-sales" class="stat-value">$0</div>
        </div>
    </div>

    <!-- Charts Section -->
    <div class="grid">
        <div class="card">
            <h3>Sales by Category</h3>
            <div class="chart-container">
                <canvas id="categoryChart"></canvas>
            </div>
        </div>
        <div class="card">
            <h3>Monthly Trend</h3>
            <div class="chart-container">
                <canvas id="trendChart"></canvas>
            </div>
        </div>
    </div>

    <!-- Data Table -->
    <div class="card">
        <h3>Raw Data Preview</h3>
        <div class="scrollable">
            <table id="data-table">
                <thead><tr id="table-head"></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSZjO-A6VhuzifXXgffaGdtD6ysazVtS1FTjeFTUxdi-q9IIfjc4DZmrS3QF7MhzKjHRqeN36ZeX_qu/pub?gid=1590006273&single=true&output=csv';

        async function initDashboard() {
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                dynamicTyping: true,
                complete: function(results) {
                    const data = results.data.filter(row => row.Category); // Filter empty rows
                    renderStats(data);
                    renderCharts(data);
                    renderTable(data);
                }
            });
        }

        function renderStats(data) {
            document.getElementById('total-records').innerText = data.length.toLocaleString();
            const total = data.reduce((sum, row) => sum + (Number(row.Sales) || 0), 0);
            document.getElementById('total-sales').innerText = '$' + Math.round(total).toLocaleString();
        }

        function renderCharts(data) {
            // Process Category Data
            const cats = {};
            data.forEach(row => {
                cats[row.Category] = (cats[row.Category] || 0) + (row.Sales || 0);
            });

            new Chart(document.getElementById('categoryChart'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(cats),
                    datasets: [{
                        data: Object.values(cats),
                        backgroundColor: ['#2563eb', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6']
                    }]
                },
                options: { maintainAspectRatio: false }
            });

            // Process Trend Data (by Date)
            const trend = {};
            data.slice(0, 50).forEach(row => { // Sample last 50 for trend
                const label = row['Order Date'] || 'Unknown';
                trend[label] = (trend[label] || 0) + (row.Sales || 0);
            });

            new Chart(document.getElementById('trendChart'), {
                type: 'line',
                data: {
                    labels: Object.keys(trend),
                    datasets: [{
                        label: 'Sales Trend',
                        data: Object.values(trend),
                        borderColor: '#2563eb',
                        tension: 0.3,
                        fill: true,
                        backgroundColor: 'rgba(37, 99, 235, 0.1)'
                    }]
                },
                options: { maintainAspectRatio: false }
            });
        }

        function renderTable(data) {
            const headers = Object.keys(data[0]);
            const headRow = document.getElementById('table-head');
            const bodyRow = document.getElementById('table-body');

            headers.forEach(h => headRow.innerHTML += `<th>${h}</th>`);
            
            data.slice(0, 20).forEach(row => {
                const tr = document.createElement('tr');
                headers.forEach(h => tr.innerHTML += `<td>${row[h] || ''}</td>`);
                bodyRow.appendChild(tr);
            });
        }

        initDashboard();
    </script>
</body>
</html>
